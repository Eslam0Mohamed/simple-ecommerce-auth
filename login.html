    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lora:ital,wght@0,400..700;1,400..700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">Shop Now</div>
        <div class="nav-list">
            <ul>
                <li class="home-item">
                    <a href="index.html">Home</a>
                </li>
                <li class="cart-item">
                    <a href="cart.html">Cart</a>
                </li>
                <li class="login-item">
                    <a href="login.html">Log in</a>
                </li>
            </ul>
             <span class="menu"><i class="fa-solid fa-bars"></i></span>
        </div>
                              <ul class="mobile-menu">
                <li class="home-item">
                    <a href="index.html">Home</a>
                </li>
                <li class="cart-item">
                    <a href="cart.html">Cart</a>
                </li>
                <li class="login-item">
                    <a href="login.html">Log in</a>
                </li>
                <li class="welcome-message"></li>
            </ul>
    </nav>

    <section class="login">
        <div class="form-container">
            <h2 class="login-heading">Log in </h2>
            <form>
                <div class="input-item">
                    <label for="user-name">User Name</label>
                    <input type="text" name="name" id="user-name">
                    <p class="error">Please Enter A valid User Name</p>
                </div>
                <div class="input-item">
                    <label for="user-password">Password</label>
                    <input type="password" name="password" id="user-password">
                    <p class="error">Please Enter A valid Password</p>
                </div>
                <button class="login-button">Log in </button>
            </form>
            <div class="model">
                <p class="model-message">you Will Be Rdirected To Home</p>
            </div>
        </div>
    </section>
    <script src="javaScript/login.js"></script>
</body>
</html>
